<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>TercümExpert</title>
    <script>
      function teShow(t, d) {
        var el = document.getElementById('root') || document.body
        el.innerHTML = '<pre style="white-space:pre-wrap;padding:20px;color:#b00020;font:13px monospace">HATA (' + t + '): ' + String(d).replace(/&/g,'&amp;').replace(/</g,'&lt;') + '</pre>'
      }
      window.addEventListener('error', function (e) {
        var x = e && e.error
        teShow('error', x ? (x.name + ': ' + x.message + '\n' + (x.stack||'')) : (e && e.message))
      })
      window.addEventListener('unhandledrejection', function (e) {
        var x = e && e.reason
        teShow('promise', x ? ((x.name||'') + ': ' + (x.message||'') + '\n' + (x.stack||'')) : String(x))
      })
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
